<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Rincón del MG | Street Gourmet</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
 --mg-main:#8a5a33;
 --mg-accent:#c89b6d;
 --mg-dark:#1f140d;
 --mg-bg:#f6efe8;
 --mg-card:#ffffff;
}

body{
 margin:0;
 font-family:'Montserrat', sans-serif;
 background:linear-gradient(#f6efe8,#efe4da);
 color:var(--mg-dark);
}

/* HEADER */
header{
 text-align:center;
 padding:50px 20px 30px;
 background:#fff;
 border-bottom:1px solid #e6d8c9;
}

header img{
 width:150px;
}

header h1{
 font-family:'Playfair Display', serif;
 color:var(--mg-main);
}

/* MENU */
.menu{
 max-width:950px;
 margin:40px auto 150px;
 padding:0 20px;
}

.item{
 background:#fff;
 padding:20px;
 border-radius:12px;
 margin-bottom:15px;
 box-shadow:0 6px 18px rgba(0,0,0,0.05);
 display:flex;
 justify-content:space-between;
 align-items:center;
 flex-wrap:wrap;
}

.price{
 font-weight:bold;
 color:var(--mg-main);
}

/* CONTROLES */
.controls{
 display:flex;
 align-items:center;
 gap:10px;
 margin-top:10px;
}

.controls button{
 background:var(--mg-main);
 color:#fff;
 border:none;
 width:28px;
 height:28px;
 border-radius:50%;
 cursor:pointer;
}

.controls span{
 min-width:20px;
 text-align:center;
}

/* TOTAL FLOAT */
.cart{
 position:fixed;
 bottom:90px;
 right:25px;
 background:#fff;
 padding:15px 20px;
 border-radius:12px;
 box-shadow:0 10px 25px rgba(0,0,0,0.15);
 font-size:.9rem;
 max-width:250px;
}

.cart h4{
 margin:0 0 10px;
}

.whatsapp{
 position:fixed;
 bottom:25px;
 right:25px;
 background:#25D366;
 color:#fff;
 padding:15px 25px;
 border-radius:50px;
 text-decoration:none;
 font-weight:500;
}
</style>
</head>

<body>

<header>
<img src="logo.png">
<h1>El Rincón del MG</h1>
</header>

<section class="menu">

<div class="item" data-name="Hamburguesa MG Especial" data-price="110">
<div>
<strong>Hamburguesa MG Especial</strong><br>
Carne, queso, guacamole
</div>
<div>
<div class="price">$110</div>
<div class="controls">
<button onclick="cambiar(this,-1)">-</button>
<span class="qty">0</span>
<button onclick="cambiar(this,1)">+</button>
</div>
</div>
</div>

<div class="item" data-name="Combo Nuggets" data-price="75">
<div>
<strong>Combo Nuggets</strong>
</div>
<div>
<div class="price">$75</div>
<div class="controls">
<button onclick="cambiar(this,-1)">-</button>
<span class="qty">0</span>
<button onclick="cambiar(this,1)">+</button>
</div>
</div>
</div>

<div class="item" data-name="Combo Boneless MG" data-price="95">
<div>
<strong>Combo Boneless MG</strong>
</div>
<div>
<div class="price">$95</div>
<div class="controls">
<button onclick="cambiar(this,-1)">-</button>
<span class="qty">0</span>
<button onclick="cambiar(this,1)">+</button>
</div>
</div>
</div>

</section>

<!-- CARRITO -->
<div class="cart">
<h4>Tu pedido</h4>
<div id="lista"></div>
<strong>Total: $<span id="total">0</span></strong>
</div>

<a class="whatsapp" href="#" onclick="enviarPedido()">Pedir por WhatsApp</a>

<script>
function cambiar(btn, cambio){
 let item = btn.closest(".item");
 let qtyElem = item.querySelector(".qty");
 let qty = parseInt(qtyElem.textContent);

 qty += cambio;
 if(qty < 0) qty = 0;

 qtyElem.textContent = qty;

 actualizar();
}

function actualizar(){
 let items = document.querySelectorAll(".item");
 let lista = "";
 let total = 0;

 items.forEach(i=>{
   let nombre = i.dataset.name;
   let precio = parseFloat(i.dataset.price);
   let qty = parseInt(i.querySelector(".qty").textContent);

   if(qty > 0){
     let subtotal = qty * precio;
     lista += `${nombre} x${qty} = $${subtotal}<br>`;
     total += subtotal;
   }
 });

 document.getElementById("lista").innerHTML = lista || "Agrega productos";
 document.getElementById("total").textContent = total;
}

function enviarPedido(){
 let items = document.querySelectorAll(".item");
 let mensaje = "Hola, quiero pedir:%0A%0A";
 let total = 0;
 let hay = false;

 items.forEach(i=>{
   let nombre = i.dataset.name;
   let precio = parseFloat(i.dataset.price);
   let qty = parseInt(i.querySelector(".qty").textContent);

   if(qty > 0){
     let subtotal = qty * precio;
     mensaje += `• ${nombre} x${qty} = $${subtotal}%0A`;
     total += subtotal;
     hay = true;
   }
 });

 if(!hay){
   alert("Agrega productos primero");
   return;
 }

 mensaje += `%0ATotal: $${total}`;

 window.open(`https://api.whatsapp.com/send?phone=529831192077&text=${mensaje}`);
}
</script>

</body>
</html>
